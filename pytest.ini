[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

markers =
    unit: Pure unit tests — no I/O, no network, fast
    integration: Mocked integration tests — no network, moderate speed
    e2e: Full end-to-end pipeline tests — mocked network, slow
    slow: Tests that take >5s (retry tests, parallel tests)
